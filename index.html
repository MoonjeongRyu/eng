<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빨모쌤 영어회화 학습 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f0;
    --surface: #ffffff;
    --surface2: #fef0f5;
    --border: #f0d9e8;
    --accent: #f4a7c3;
    --accent2: #e8839f;
    --text: #4a3f4a;
    --text-dim: #9e8fa0;
    --text-dimmer: #cbbdcc;
    --done: #7dc9a0;
    --review: #9db8f0;
    --today-glow: rgba(244, 167, 195, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 32px 24px 0;
    position: relative;
  }

  .header-inner {
    max-width: 480px;
    margin: 0 auto;
  }

  .book-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .book-title {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }

  .book-title em {
    font-style: italic;
    color: var(--accent2);
  }

  .header-stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    padding: 16px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 2px 12px rgba(244,167,195,0.12);
  }

  .stat-item {
    flex: 1;
    text-align: center;
  }

  .stat-num {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    max-width: 480px;
    margin: 16px auto 0;
    padding: 0 24px;
  }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f9c5d8, var(--review));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dimmer);
    font-family: 'DM Mono', monospace;
  }

  /* TABS */
  .tabs {
    max-width: 480px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 4px;
    box-shadow: 0 2px 8px rgba(244,167,195,0.1);
  }

  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.2s;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-weight: 800;
    box-shadow: 0 2px 8px rgba(244,167,195,0.4);
  }

  /* PANELS */
  .panel {
    display: none;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 24px 100px;
  }

  .panel.active { display: block; }

  /* TODAY BANNER */
  .today-banner {
    background: linear-gradient(135deg, #fff0f6, #fef6ff);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(244,167,195,0.2);
  }

  .today-banner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(232,197,71,0.1) 0%, transparent 70%);
  }

  .today-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .today-unit {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-top: 4px;
    color: var(--text);
  }

  .today-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .complete-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(244,167,195,0.4);
  }

  .complete-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(244,167,195,0.5); }
  .complete-btn:active { transform: translateY(0); }
  .complete-btn.done {
    background: linear-gradient(135deg, var(--done), #5bb888);
    box-shadow: 0 4px 12px rgba(125,201,160,0.4);
  }

  /* REVIEW SECTION */
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dimmer);
    text-transform: uppercase;
    margin: 20px 0 10px;
  }

  .review-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .review-card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(244,167,195,0.15); }

  .review-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(91, 141, 212, 0.15);
    border: 1px solid var(--review);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--review);
    flex-shrink: 0;
  }

  .review-info { flex: 1; }
  .review-unit { font-size: 13px; font-weight: 500; }
  .review-meta { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .review-done-btn {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .review-done-btn:hover {
    border-color: var(--done);
    color: var(--done);
  }

  /* UNIT GRID */
  .unit-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .unit-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface);
  }

  .unit-cell:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  .unit-cell.completed {
    background: rgba(74, 158, 106, 0.1);
    border-color: var(--done);
    color: var(--done);
  }

  .unit-cell.today-cell {
    border-color: var(--accent);
    color: var(--accent2);
    background: linear-gradient(135deg, #fff0f6, #fef6ff);
    box-shadow: 0 2px 8px rgba(244,167,195,0.3);
    font-weight: 800;
  }

  .unit-cell .reads {
    position: absolute;
    top: 2px; right: 3px;
    font-size: 7px;
    color: var(--accent);
  }

  /* ROUNDS display */
  .rounds-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .round-dot {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    color: var(--text-dimmer);
    font-family: 'DM Mono', monospace;
  }

  .round-dot.filled {
    background: rgba(232, 197, 71, 0.2);
    color: var(--accent);
    border: 1px solid var(--accent2);
  }

  /* QUIZ PANEL */
  .quiz-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    margin-top: 8px;
  }

  .quiz-prompt {
    font-size: 11px;
    color: var(--text-dimmer);
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
  }

  .quiz-korean {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .quiz-answer {
    margin-top: 20px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text-dim);
    display: none;
    text-align: left;
  }

  .quiz-answer .en {
    color: var(--accent);
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .quiz-answer .ko {
    font-size: 12px;
    color: var(--text-dimmer);
  }

  .quiz-controls {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .quiz-btn {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }

  .quiz-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: var(--accent);
    color: white;
    font-weight: 800;
    box-shadow: 0 3px 10px rgba(244,167,195,0.4);
  }

  .quiz-btn:hover:not(.primary) { border-color: var(--text-dim); color: var(--text); }
  .quiz-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(244,167,195,0.5); }

  .quiz-progress {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 12px;
    text-align: center;
  }

  /* UNIT input */
  .unit-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .unit-selector label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .unit-selector select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
  }

  /* EXPRESSION INPUT */
  .expr-section {
    margin-top: 8px;
  }

  .expr-input-wrap {
    display: flex;
    gap: 8px;
  }

  .expr-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .expr-input:focus { border-color: var(--accent); }

  .expr-add-btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 800;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    box-shadow: 0 3px 10px rgba(244,167,195,0.4);
    font-family: 'Nunito', sans-serif;
  }

  .expr-add-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(244,167,195,0.5); }

  .expr-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .expr-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .expr-item-text { flex: 1; }
  .expr-item-en { font-size: 13px; color: var(--accent); font-weight: 500; }
  .expr-item-ko { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .expr-del {
    background: none;
    border: none;
    color: var(--text-dimmer);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
    transition: color 0.2s;
  }
  .expr-del:hover { color: #e05555; }

  /* NOTIFICATION */
  .notif-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 8px;
  }

  .notif-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .notif-row:last-child { border-bottom: none; }

  .notif-label { font-size: 13px; }
  .notif-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .toggle {
    width: 44px; height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .toggle.on::after { transform: translateX(20px); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 0 8px;
    max-width: 480px;
    margin: 0 auto;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    color: var(--text-dimmer);
  }

  .nav-item.active { color: var(--accent); }
  .nav-item:hover { color: var(--text-dim); }

  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; letter-spacing: 0.05em; font-family: 'DM Mono', monospace; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-dimmer);
    font-size: 13px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 28px 28px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 16px;
  }

  .modal-unit-name {
    color: var(--accent);
  }

  .loading-text {
    color: var(--text-dim);
    font-size: 13px;
    padding: 16px 0;
  }

  .expr-explain {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .expr-explain-phrase { color: var(--accent); font-weight: 600; font-size: 14px; }
  .expr-explain-body { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.7; }

  .modal-close {
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: var(--border);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }



  .unit-group { margin-bottom: 6px; }

  .unit-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }

  .unit-group-header:hover { border-color: var(--text-dimmer); }
  .unit-group-header.open { border-color: var(--accent); border-radius: 8px 8px 0 0; }

  .unit-group-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .unit-group-meta {
    font-size: 10px;
    color: var(--text-dimmer);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .unit-group-arrow {
    font-size: 10px;
    color: var(--text-dimmer);
    transition: transform 0.2s;
  }

  .unit-group-header.open .unit-group-arrow { transform: rotate(180deg); }

  .unit-group-body {
    display: none;
    flex-direction: column;
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }

  .unit-group-body.open { display: flex; }

  .unit-group-body .expr-item {
    border-radius: 0;
    border: none;
    border-bottom: 1px solid var(--border);
  }

  .unit-group-body .expr-item:last-child { border-bottom: none; }

  .dialogue-check-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }
  .dialogue-check-wrap input[type="checkbox"] {
    accent-color: var(--review);
    width: 16px; height: 16px;
    cursor: pointer;
  }
  .dialogue-check-label {
    font-size: 12px;
    color: var(--text-dim);
  }
  .dialogue-badge {
    display: inline-block;
    background: rgba(91,141,212,0.15);
    border: 1px solid var(--review);
    color: var(--review);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .quiz-mode-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .mode-btn {
    flex: 1;
    padding: 8px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--review);
    border-color: var(--review);
    color: white;
    font-weight: 700;
  }
  .dialogue-line {
    font-size: 11px;
    color: var(--review);
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel.active { animation: fadeIn 0.25s ease; }

  .sync-toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: opacity 0.3s;
  }
  .sync-toast.success { border-color: var(--done); color: var(--done); }
  .sync-toast.error { border-color: #e05555; color: #e05555; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="book-label">🌸 학습 트래커</div>
    </div>
    <div class="book-title"><em>빨모쌤의</em> 라이브 영어회화</div>
    <div class="header-stats">
      <div class="stat-item">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-label">완료 유닛</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num" id="statTotal">75</div>
        <div class="stat-label">전체 유닛</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num" id="statRound">1</div>
        <div class="stat-label">회독</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num" id="statStreak">0</div>
        <div class="stat-label">연속 🔥</div>
      </div>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-labels">
    <span id="progressLeft">0 / 75</span>
    <span id="progressRight">0%</span>
  </div>
</div>

<div class="tabs" style="max-width:480px;margin:16px auto 0;padding:4px 4px;">
  <div class="tab active" onclick="switchTab('today')">오늘</div>
  <div class="tab" onclick="switchTab('units')">전체</div>
  <div class="tab" onclick="switchTab('quiz')">암기</div>
  <div class="tab" onclick="switchTab('vocab')">표현</div>
</div>

<!-- TODAY PANEL -->
<div class="panel active" id="panel-today">
  <div class="today-banner">
    <div class="today-date" id="todayDate"></div>
    <div class="today-unit" id="todayUnitTitle">Unit 1</div>
    <div class="today-sub" id="todayUnitSub">오늘 학습할 유닛</div>
    <button class="complete-btn" id="completeTodayBtn" onclick="completeToday()">✓ 오늘 완료로 표시</button>
  </div>

  <div class="section-title">복습 예정</div>
  <div class="review-list" id="reviewList">
    <div class="empty-state">
      <div class="empty-icon">🎯</div>
      복습할 유닛이 없어요.<br>학습을 시작하면 자동으로 생겨요!
    </div>
  </div>
</div>

<!-- UNITS PANEL -->
<div class="panel" id="panel-units">
  <div class="section-title">전체 진도</div>
  <div class="unit-grid" id="unitGrid"></div>
</div>

<!-- QUIZ PANEL -->
<div class="panel" id="panel-quiz">
  <div class="quiz-mode-toggle">
    <button class="mode-btn active" id="modeNormal" onclick="setQuizMode('normal')">일반 표현 암기</button>
    <button class="mode-btn" id="modeDialogue" onclick="setQuizMode('dialogue')">Dialogue 롤플레이</button>
  </div>
  <div class="unit-selector">
    <label>암기 범위</label>
    <select id="quizUnitSelect" onchange="loadQuizExpressions()">
      <option value="all">저장된 표현 전체</option>
    </select>
  </div>
  <div class="quiz-box">
    <div class="quiz-prompt" id="quizPrompt">한글 뜻을 보고 영어로 말해보세요</div>
    <div class="quiz-korean" id="quizKorean">저장된 표현이 없어요 👆<br><span style="font-size:14px;color:var(--text-dim)">표현 탭에서 먼저 추가해주세요</span></div>
    <div class="quiz-answer" id="quizAnswer">
      <div class="dialogue-line" id="quizAnswerLine" style="display:none"></div>
      <div class="en" id="quizAnswerEn"></div>
      <div class="ko" id="quizAnswerKo"></div>
    </div>
    <div class="quiz-controls" id="quizControlsReveal">
      <button class="quiz-btn primary" style="width:100%" onclick="revealAnswer()">정답 보기</button>
    </div>
    <div class="quiz-controls" id="quizControlsJudge" style="display:none">
      <button class="quiz-btn" style="border-color:#e05555;color:#e05555" onclick="markWrong()">✕ 틀렸어</button>
      <button class="quiz-btn primary" onclick="markCorrect()">○ 맞았어</button>
    </div>
    <div class="quiz-progress" id="quizProgress"></div>
  </div>
</div>

<!-- VOCAB PANEL -->
<div class="panel" id="panel-vocab">
  <div class="section-title">표현 & 모르는 것 저장</div>
  <div class="expr-section">
    <div class="expr-input-wrap">
      <input class="expr-input" id="exprEn" placeholder="영어 표현 (예: I'm up for it)" />
      <button class="expr-add-btn" onclick="openAddExpr()">+</button>
    </div>
    <input class="expr-input" id="exprKo" placeholder="한글 뜻 (예: 나 그거 하고 싶어)" style="margin-top:6px;width:100%;" />
    <input type="number" id="exprUnit" min="1" max="75" placeholder="유닛 번호 입력 (예: 1)" style="margin-top:6px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;" />
    <label class="dialogue-check-wrap">
      <input type="checkbox" id="exprIsDialogue" />
      <span class="dialogue-check-label">Dialogue 파트 (대화 흐름 순서로 학습)</span>
    </label>
    <button class="expr-add-btn" onclick="addExpression()" style="margin-top:8px;width:100%;padding:11px;">저장하기</button>
  </div>
  <div class="section-title" style="margin-top:20px;">저장된 표현</div>
  <div class="expr-list" id="exprList"></div>
</div>

<!-- MODAL for unit detail -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Unit <span id="modalUnitNum" class="modal-unit-name"></span> 복습</div>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeModalDirect()">닫기</button>
  </div>
</div>

<script>
// ===== STATE =====
let state = JSON.parse(localStorage.getItem('bbalmo_state') || 'null') || {
  units: {},
  expressions: [],
  startDate: new Date().toDateString(),
  todayUnit: 1,
  streak: 0,
  lastStudyDate: null
};

const TOTAL = 75;
const REVIEW_INTERVALS = [1, 3, 7, 14, 30];

function showToast(msg, type = '') {
  const old = document.getElementById('syncToast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.id = 'syncToast';
  t.className = 'sync-toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function save() {
  localStorage.setItem('bbalmo_state', JSON.stringify(state));
}

// ===== DATE HELPERS =====
function today() { return new Date().toDateString(); }
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

// ===== INIT =====
function init() {
  computeTodayUnit();
  updateStats();
  renderTodayPanel();
  renderUnitGrid();
  renderExprList();
  renderQuiz();
}

function computeTodayUnit() {
  // Find next unit not completed or partially done
  const completedAll = Object.entries(state.units)
    .filter(([k,v]) => v.completedDates && v.completedDates.length > 0)
    .map(([k]) => parseInt(k));

  let nextUnit = 1;
  for (let i = 1; i <= TOTAL; i++) {
    if (!completedAll.includes(i)) { nextUnit = i; break; }
  }
  state.todayUnit = nextUnit;

  // Update streak
  if (state.lastStudyDate) {
    const diff = daysBetween(state.lastStudyDate, today());
    if (diff === 0) { /* same day */ }
    else if (diff === 1) { /* streak continues */ }
    else { state.streak = 0; }
  }

  const d = new Date();
  document.getElementById('todayDate').textContent =
    `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. (${['일','월','화','수','목','금','토'][d.getDay()]})`;
}

function updateStats() {
  const done = Object.values(state.units).filter(v => v.completedDates?.length > 0).length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statStreak').textContent = state.streak;
  const pct = Math.round(done / TOTAL * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLeft').textContent = `${done} / ${TOTAL}`;
  document.getElementById('progressRight').textContent = pct + '%';
}

function renderTodayPanel() {
  const u = state.todayUnit;
  document.getElementById('todayUnitTitle').textContent = `Unit ${u}`;

  const uData = state.units[u];
  const isCompletedToday = uData?.completedDates?.includes(today());

  if (isCompletedToday) {
    document.getElementById('todayUnitSub').textContent = '✅ 오늘 완료됨!';
    const btn = document.getElementById('completeTodayBtn');
    btn.textContent = '✓ 완료!';
    btn.className = 'complete-btn done';
  } else {
    document.getElementById('todayUnitSub').textContent = `1회독 진행 중 · ${u}번째 유닛`;
    const btn = document.getElementById('completeTodayBtn');
    btn.textContent = '✓ 오늘 완료로 표시';
    btn.className = 'complete-btn';
  }

  // Review list
  const reviewItems = getReviewDue();
  const list = document.getElementById('reviewList');

  if (reviewItems.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div>복습할 유닛이 없어요!<br>학습을 시작하면 자동으로 생겨요.</div>`;
  } else {
    list.innerHTML = reviewItems.map(item => `
      <div class="review-card" onclick="openUnitModal(${item.unit})">
        <div class="review-badge">${item.unit}</div>
        <div class="review-info">
          <div class="review-unit">Unit ${item.unit} 복습</div>
          <div class="review-meta">${item.label} · ${item.daysAgo}일 전 학습</div>
        </div>
        <button class="review-done-btn" onclick="markReviewDone(event, ${item.unit})">완료</button>
      </div>
    `).join('');
  }
}

function getReviewDue() {
  const due = [];
  const todayStr = today();

  Object.entries(state.units).forEach(([unitNum, data]) => {
    if (!data.completedDates?.length) return;
    const lastComplete = data.completedDates[data.completedDates.length - 1];
    const daysAgo = daysBetween(lastComplete, todayStr);

    REVIEW_INTERVALS.forEach((interval, idx) => {
      if (daysAgo >= interval) {
        const alreadyReviewed = data.reviewDates?.some(r => {
          return r.interval === interval && daysBetween(lastComplete, r.date) >= interval;
        });
        if (!alreadyReviewed) {
          const labels = ['1일 후', '3일 후', '1주일 후', '2주일 후', '1달 후'];
          due.push({ unit: parseInt(unitNum), label: labels[idx], daysAgo, interval });
        }
      }
    });
  });

  return due.slice(0, 5); // show max 5
}

function completeToday() {
  const u = state.todayUnit;
  if (!state.units[u]) state.units[u] = { completedDates: [], reviewDates: [] };
  const todayStr = today();
  if (!state.units[u].completedDates.includes(todayStr)) {
    state.units[u].completedDates.push(todayStr);
    // Streak
    if (state.lastStudyDate === today()) { /* already */ }
    else if (state.lastStudyDate && daysBetween(state.lastStudyDate, today()) === 1) {
      state.streak++;
    } else {
      state.streak = 1;
    }
    state.lastStudyDate = todayStr;
  }
  save();
  init();
}

function markReviewDone(e, unitNum) {
  e.stopPropagation();
  if (!state.units[unitNum]) return;
  if (!state.units[unitNum].reviewDates) state.units[unitNum].reviewDates = [];
  state.units[unitNum].reviewDates.push({ date: today(), interval: 999 });
  save();
  renderTodayPanel();
}

// ===== UNIT GRID =====
function renderUnitGrid() {
  const grid = document.getElementById('unitGrid');
  let html = '';
  for (let i = 1; i <= TOTAL; i++) {
    const uData = state.units[i];
    const completed = uData?.completedDates?.length > 0;
    const isToday = i === state.todayUnit;
    const reads = uData?.completedDates?.length || 0;
    let cls = 'unit-cell';
    if (completed) cls += ' completed';
    if (isToday) cls += ' today-cell';
    html += `<div class="${cls}" onclick="openUnitModal(${i})">
      ${i}
      ${reads > 0 ? `<span class="reads">${reads}x</span>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

// ===== MODAL =====
function openUnitModal(unitNum) {
  document.getElementById('modalUnitNum').textContent = unitNum;
  const uData = state.units[unitNum];
  const exprs = state.expressions.filter(e => e.unit == unitNum);

  let content = '';
  if (uData?.completedDates?.length) {
    content += `<div style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">
      학습일: ${uData.completedDates.map(formatDate).join(', ')}
    </div>`;
    const rounds = `<div class="rounds-row">`;
    content += `<div style="font-size:11px;color:var(--text-dimmer);margin-bottom:6px;">회독 기록</div>`;
    content += `<div class="rounds-row">`;
    for (let i = 0; i < 10; i++) {
      const filled = i < uData.completedDates.length;
      content += `<div class="round-dot ${filled ? 'filled' : ''}">${i+1}</div>`;
    }
    content += `</div>`;
  } else {
    content += `<div style="color:var(--text-dim);font-size:13px;margin-bottom:12px;">아직 학습하지 않은 유닛이에요.</div>`;
  }

  if (exprs.length > 0) {
    content += `<div style="font-size:11px;color:var(--text-dimmer);margin:14px 0 8px;">저장된 표현 (${exprs.length}개)</div>`;
    exprs.forEach(e => {
      content += `<div class="expr-explain"><div class="expr-explain-phrase">${e.en}</div><div class="expr-explain-body">${e.ko}</div></div>`;
    });
  }

  document.getElementById('modalContent').innerHTML = content || '<div style="color:var(--text-dim);font-size:13px;">저장된 내용이 없어요.</div>';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ===== EXPRESSIONS =====
function renderExprList() {
  const list = document.getElementById('exprList');
  const exprs = state.expressions;

  // Populate unit selects
  const unitSelects = [document.getElementById('exprUnit')];
  // exprUnit already has static options via HTML

  // quiz unit select
  const quizSel = document.getElementById('quizUnitSelect');
  quizSel.innerHTML = '<option value="all">저장된 표현 전체</option>';
  for (let i = 1; i <= 75; i++) {
    quizSel.innerHTML += `<option value="${i}">Unit ${i}</option>`;
  }

  if (exprs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div>아직 저장된 표현이 없어요.<br>위에서 추가해보세요!</div>`;
    return;
  }

  // 유닛별 그룹화
  const groups = {};
  exprs.forEach(e => {
    const key = e.unit > 0 ? e.unit : 0;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const sortedKeys = Object.keys(groups).map(Number).sort((a,b) => a - b);

  list.innerHTML = sortedKeys.map(unitKey => {
    const groupExprs = groups[unitKey];
    const label = unitKey === 0 ? '유닛 미지정' : `Unit ${unitKey}`;
    const count = groupExprs.length;
    const dialogueCount = groupExprs.filter(e => e.isDialogue).length;
    const metaStr = dialogueCount > 0 ? `${count}개 · DIALOGUE ${dialogueCount}개` : `${count}개`;
    const groupId = 'group-' + unitKey;

    const items = groupExprs.map(e => `
      <div class="expr-item" id="expr-item-${e.id}">
        <div class="expr-item-text" id="expr-view-${e.id}">
          <div class="expr-item-en">${e.en}${e.isDialogue ? '<span class="dialogue-badge">DIALOGUE</span>' : ''}</div>
          <div class="expr-item-ko">${e.ko}${e.isDialogue ? ` · #${e.dialogueOrder}번째 줄` : ''}</div>
        </div>
        <div id="expr-edit-${e.id}" style="display:none;flex:1;flex-direction:column;gap:5px;">
          <input id="edit-en-${e.id}" value="${e.en.replace(/"/g, '&quot;')}" style="background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;width:100%;" placeholder="영어 표현" />
          <input id="edit-ko-${e.id}" value="${e.ko.replace(/"/g, '&quot;')}" style="background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;width:100%;" placeholder="한글 뜻" />
          <div style="display:flex;gap:5px;margin-top:2px;">
            <button onclick="saveEdit('${e.id}')" style="flex:1;padding:6px;background:var(--accent);border:none;border-radius:6px;color:var(--bg);font-size:12px;font-weight:700;cursor:pointer;">저장</button>
            <button onclick="cancelEdit('${e.id}')" style="flex:1;padding:6px;background:var(--border);border:none;border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;">취소</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-left:6px;flex-shrink:0;">
          <button class="expr-del" id="expr-edit-btn-${e.id}" onclick="startEdit('${e.id}')" style="color:var(--text-dimmer);">✎</button>
          <button class="expr-del" onclick="deleteExpr('${e.id}')">✕</button>
        </div>
      </div>
    `).join('');

    return `
      <div class="unit-group">
        <div class="unit-group-header" id="${groupId}-header" onclick="toggleGroup('${groupId}')">
          <span class="unit-group-title">${label}</span>
          <span class="unit-group-meta">${metaStr} <span class="unit-group-arrow">▼</span></span>
        </div>
        <div class="unit-group-body" id="${groupId}-body">
          ${items}
        </div>
      </div>
    `;
  }).join('');

  // 가장 최근 유닛 자동으로 열기
  if (sortedKeys.length > 0) {
    const lastKey = sortedKeys[sortedKeys.length - 1];
    const lastGroupId = 'group-' + lastKey;
    const header = document.getElementById(lastGroupId + '-header');
    const body = document.getElementById(lastGroupId + '-body');
    if (header && body) {
      header.classList.add('open');
      body.classList.add('open');
    }
  }
}

function addExpression() {
  const en = document.getElementById('exprEn').value.trim();
  const ko = document.getElementById('exprKo').value.trim();
  const unit = parseInt(document.getElementById('exprUnit').value) || 0;
  const isDialogue = document.getElementById('exprIsDialogue').checked;
  if (!en || !ko) { alert('영어 표현과 한글 뜻을 모두 입력해주세요.'); return; }

  // Dialogue면 같은 유닛 내 dialogue 순서 계산
  const dialogueOrder = isDialogue
    ? state.expressions.filter(e => e.isDialogue && e.unit === unit).length + 1
    : 0;

  state.expressions.push({ en, ko, unit, isDialogue, dialogueOrder, id: Date.now().toString() });
  document.getElementById('exprEn').value = '';
  document.getElementById('exprKo').value = '';
  // 체크박스는 유지 (연속 입력 편의)
  save();
  renderExprList();
  renderQuiz();
}

function toggleGroup(groupId) {
  const header = document.getElementById(groupId + '-header');
  const body = document.getElementById(groupId + '-body');
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function startEdit(id) {
  document.getElementById('expr-view-' + id).style.display = 'none';
  document.getElementById('expr-edit-' + id).style.display = 'flex';
  document.getElementById('expr-edit-btn-' + id).style.display = 'none';
  document.getElementById('edit-en-' + id).focus();
}

function cancelEdit(id) {
  document.getElementById('expr-view-' + id).style.display = 'block';
  document.getElementById('expr-edit-' + id).style.display = 'none';
  document.getElementById('expr-edit-btn-' + id).style.display = 'block';
}

function saveEdit(id) {
  const en = document.getElementById('edit-en-' + id).value.trim();
  const ko = document.getElementById('edit-ko-' + id).value.trim();
  if (!en || !ko) { alert('내용을 입력해주세요.'); return; }
  const expr = state.expressions.find(e => e.id === id);
  if (expr) { expr.en = en; expr.ko = ko; }
  save();
  renderExprList();
  renderQuiz();
}

function deleteExpr(id) {
  state.expressions = state.expressions.filter(e => e.id !== id);
  save();
  renderExprList();
  renderQuiz();
}

// ===== QUIZ =====
let quizPool = [];
let quizWrong = [];
let quizIdx = 0;
let quizTotalOriginal = 0;
let quizMode = 'normal'; // 'normal' | 'dialogue'

// Dialogue 모드 전용
let dialogueLines = [];   // 현재 대화 전체 줄
let dialogueLineIdx = 0;  // 현재 줄 인덱스
let dialogueGroups = [];  // 남은 대화 그룹
let dialogueWrong = [];   // 틀린 줄

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setQuizMode(mode) {
  quizMode = mode;
  document.getElementById('modeNormal').classList.toggle('active', mode === 'normal');
  document.getElementById('modeDialogue').classList.toggle('active', mode === 'dialogue');
  loadQuizExpressions();
}

function loadQuizExpressions() {
  const val = document.getElementById('quizUnitSelect').value;
  const base = val === 'all'
    ? [...state.expressions]
    : state.expressions.filter(e => e.unit == parseInt(val));

  if (quizMode === 'normal') {
    quizPool = shuffle(base.filter(e => !e.isDialogue));
    quizWrong = [];
    quizIdx = 0;
    quizTotalOriginal = quizPool.length;
    document.getElementById('quizPrompt').textContent = '한글 뜻을 보고 영어로 말해보세요';
    renderQuizCard();
  } else {
    // Dialogue 모드: 유닛별로 그룹화, 순서 유지
    const dialogueExprs = base.filter(e => e.isDialogue).sort((a,b) => {
      if (a.unit !== b.unit) return a.unit - b.unit;
      return a.dialogueOrder - b.dialogueOrder;
    });
    // 유닛별 그룹
    const groups = {};
    dialogueExprs.forEach(e => {
      const key = e.unit || 0;
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    });
    dialogueGroups = Object.values(groups);
    dialogueWrong = [];
    document.getElementById('quizPrompt').textContent = '대화 흐름대로 영어로 말해보세요';
    startNextDialogueGroup();
  }
}

function startNextDialogueGroup() {
  if (dialogueGroups.length === 0 && dialogueWrong.length === 0) {
    document.getElementById('quizAnswer').style.display = 'none';
    document.getElementById('quizControlsReveal').style.display = 'flex';
    document.getElementById('quizControlsJudge').style.display = 'none';
    document.getElementById('quizKorean').innerHTML = '🎉 Dialogue 전부 완료!<br><span style="font-size:14px;color:var(--text-dim)">다시 시작하려면 범위를 다시 선택해</span>';
    document.getElementById('quizProgress').textContent = '';
    return;
  }
  if (dialogueGroups.length === 0) {
    dialogueGroups = [...dialogueWrong];
    dialogueWrong = [];
    document.getElementById('quizKorean').innerHTML = `🔄 틀린 줄 다시 풀기!`;
    setTimeout(() => { startNextDialogueGroup(); }, 900);
    return;
  }
  dialogueLines = dialogueGroups.shift();
  dialogueLineIdx = 0;
  renderDialogueLine();
}

function renderDialogueLine() {
  document.getElementById('quizAnswer').style.display = 'none';
  document.getElementById('quizControlsReveal').style.display = 'flex';
  document.getElementById('quizControlsJudge').style.display = 'none';

  const line = dialogueLines[dialogueLineIdx];
  const lineLabel = line.dialogueOrder ? `${line.dialogueOrder}번째 줄` : '';
  document.getElementById('quizKorean').textContent = line.ko;
  document.getElementById('quizAnswerLine').textContent = `Unit ${line.unit} · ${lineLabel}`;
  document.getElementById('quizAnswerLine').style.display = 'block';
  document.getElementById('quizAnswerEn').textContent = line.en;
  document.getElementById('quizAnswerKo').textContent = line.ko;
  document.getElementById('quizProgress').textContent =
    `${dialogueLineIdx + 1} / ${dialogueLines.length}번째 줄 · 남은 그룹 ${dialogueGroups.length}개`;
}

function renderQuiz() {
  loadQuizExpressions();
}

function renderQuizCard() {
  document.getElementById('quizAnswer').style.display = 'none';
  document.getElementById('quizControlsReveal').style.display = 'flex';
  document.getElementById('quizControlsJudge').style.display = 'none';
  document.getElementById('quizAnswerLine').style.display = 'none';

  if (quizPool.length === 0 && quizWrong.length === 0) {
    if (quizTotalOriginal === 0) {
      document.getElementById('quizKorean').innerHTML = '저장된 표현이 없어요 👆<br><span style="font-size:14px;color:var(--text-dim)">표현 탭에서 먼저 추가해주세요</span>';
      document.getElementById('quizProgress').textContent = '';
    } else {
      document.getElementById('quizKorean').innerHTML = '🎉 전부 맞혔어!<br><span style="font-size:14px;color:var(--text-dim)">다시 시작하려면 범위를 다시 선택해</span>';
      document.getElementById('quizProgress').textContent = `${quizTotalOriginal}개 완료 ✓`;
    }
    return;
  }

  if (quizPool.length === 0) {
    quizPool = shuffle([...quizWrong]);
    quizWrong = [];
    quizIdx = 0;
    document.getElementById('quizKorean').innerHTML = `🔄 틀린 ${quizPool.length}개 다시 풀기!`;
    document.getElementById('quizProgress').textContent = '';
    setTimeout(renderQuizCard, 1000);
    return;
  }

  const item = quizPool[quizIdx];
  document.getElementById('quizKorean').textContent = item.ko;
  document.getElementById('quizAnswerEn').textContent = item.en;
  document.getElementById('quizAnswerKo').textContent = item.ko + (item.unit > 0 ? ` (Unit ${item.unit})` : '');

  const remaining = quizPool.length + quizWrong.length;
  document.getElementById('quizProgress').textContent =
    `남은 문제 ${remaining}개 · 틀린 문제 ${quizWrong.length}개`;
}

function revealAnswer() {
  if (quizMode === 'dialogue') {
    if (!dialogueLines.length) return;
    document.getElementById('quizAnswer').style.display = 'block';
    document.getElementById('quizControlsReveal').style.display = 'none';
    document.getElementById('quizControlsJudge').style.display = 'flex';
    return;
  }
  if (quizPool.length === 0) return;
  document.getElementById('quizAnswer').style.display = 'block';
  document.getElementById('quizControlsReveal').style.display = 'none';
  document.getElementById('quizControlsJudge').style.display = 'flex';
}

function markCorrect() {
  if (quizMode === 'dialogue') {
    dialogueLineIdx++;
    if (dialogueLineIdx >= dialogueLines.length) {
      startNextDialogueGroup();
    } else {
      renderDialogueLine();
    }
    return;
  }
  quizPool.splice(quizIdx, 1);
  if (quizIdx >= quizPool.length) quizIdx = 0;
  renderQuizCard();
}

function markWrong() {
  if (quizMode === 'dialogue') {
    // 틀린 줄이 속한 그룹 전체를 다시 풀기
    dialogueWrong.push(dialogueLines);
    startNextDialogueGroup();
    return;
  }
  quizWrong.push(quizPool[quizIdx]);
  quizPool.splice(quizIdx, 1);
  if (quizIdx >= quizPool.length) quizIdx = 0;
  renderQuizCard();
}

function nextQuiz() { markCorrect(); }

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  event.target.classList.add('active');

  if (tab === 'units') renderUnitGrid();
  if (tab === 'quiz') renderQuiz();
  if (tab === 'vocab') renderExprList();
}

init();
</script>

</html>
